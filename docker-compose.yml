services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: vinylstore
      POSTGRES_USER: vinylstore
      POSTGRES_PASSWORD: vinylstore
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinylstore -d vinylstore"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: vinylstore
      POSTGRES_USER: vinylstore
      POSTGRES_PASSWORD: vinylstore
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
